generations:
  - name: "First Generation (G08)"
    start_year: 2020
    end_year: 2024
    description: "The BMW iX3 is the brand's first all-electric SUV, based on the conventional X3 (G01) platform rather than a dedicated EV architecture. This approach represents BMW's flexible strategy allowing production of combustion engine, plug-in hybrid, and fully electric vehicles on the same production line. The exterior design largely mirrors the standard X3 with unique aerodynamic wheels, blue accents, and a blanked-off kidney grille identifying it as an electric model. Unlike some competitors, the iX3 features a single rear-mounted electric motor producing 282 HP (210 kW) and 400 Nm of torque, making it rear-wheel drive rather than all-wheel drive. The 80 kWh battery (net capacity: 73.83 kWh usable) provides a WLTP range of up to 460 km (286 miles). The iX3 supports DC fast charging at up to 150 kW, allowing a 0-80% charge in 34 minutes and adding 100 km of range in 10 minutes. Inside, the interior closely resembles the standard X3 with the addition of blue accents and EV-specific displays. The iX3 features BMW's fifth-generation eDrive technology with a more energy-dense battery and motor system that would later be used in vehicles like the i4 and iX. Production began in September 2020 at BMW's factory in Dadong, Shenyang, China. The iX3 was not available in North America due to market-specific requirements and its rear-wheel-drive configuration. It was replaced by the second-generation iX3 (NA5) in 2025, which uses the new Neue Klasse platform."
